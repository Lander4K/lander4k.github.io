# Site
name              : "L4nder"
title             : "L4nder"
description       : "Bienvenido al blog de L4nder!"
logo              : 'assets/images/l4nder.jpg'
favicon           : 'assets/images/favicon.ico'

# URL
url               : "https://lander4k.github.io" # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl           : # the subpath of your site, e.g. "/blog"
repository        : "Lander4K/lander4k.github.io" # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"

include           : ["_pages"]
google_analytics  : 'UA-xxxxxxxx-1'
disqus            : 'demowebsite'
mailchimp-list    : # 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'
permalink         : /:categories/:title
email             : #

# Authors
authors:
  L4nder:
    name          : L4nder
    display_name  : L4nder
    gravatar      : https://es.gravatar.com/userimage/232626859/adab85e9608b009a65ce52e1e0281f43.jpg?size=original
    email         : #
    twitter       : https://twitter.com/L4nder4K
    description   : #"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
highlighter: rouge
markdown: kramdown
kramdown:
   syntax_highlighter_opts:
      disable : true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

# Post Author Box ("enabled" or "disabled")
authorbox: "disabled"

# Sass
sass:
  sass_dir: _sass
  style: compressed

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
